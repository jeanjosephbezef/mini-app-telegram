<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LE FILON 74</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="header">
        <h1>🛍️ LE FILON 74</h1>
        <p>Qualité • Rapidité • Discrétion</p>
    </header>

    <div class="search-box">
        <input
            type="text"
            id="search"
            placeholder="Rechercher un produit..."
            onkeyup="rechercherProduit()">
    </div>

    <div class="categories">


        <button onclick="filtrerCategorie('Weed')">
            🎒 Accessoires
        </button>

        <button onclick="filtrerCategorie('Hash')">
            ⭐ Premium
        </button>

        <button onclick="filtrerCategorie('Festif')">
            🎉 Festif
        </button>

    </div>

    <h2>Nos produits</h2>

    <div id="products" class="products"></div>

</div>


<div id="cart" class="cart">

    <div class="cart-header">

        <h2>🛒 Mon panier</h2>

        <button onclick="fermerPanier()">
            ✖
        </button>

    </div>

    <div id="cartItems"></div>

    <div class="cart-footer">

        <h3>
            Total :
            <span id="total">0.00</span> €
        </h3>

        <button class="checkout">
            Commander
        </button>

    </div>

</div>


<nav class="bottom-nav">

    <button onclick="location.reload()">
        🏠
    </button>

    <button onclick="filtrerCategorie('Tous')">
        📂
    </button>

    <button onclick="ouvrirPanier()">
        🛒
        <span id="count">0</span>
    </button>

    <button>
        👤
    </button>

</nav>

<script src="script.js"></script>

</body>

</html>
